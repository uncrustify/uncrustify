# Config to test that string options with embedded quotes/backslashes
# are written back correctly by --update-config.
#
# include_category_0 contains a regex with an escaped double-quote (\")
# include_category_1 contains a path with escaped backslashes (\\)
include_category_0              = "(?!.*generated.h\").*"
include_category_1              = "path\\to\\file"
